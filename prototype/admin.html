<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  (async () => {
    const res = await fetch('/api/admin-check');
    const { authenticated } = await res.json();
    if (authenticated) return;

    document.documentElement.style.display = 'none';

    const style = document.createElement('style');
    style.textContent = `
      body { font-family: sans-serif; display: flex; align-items: center;
             justify-content: center; height: 100vh; margin: 0;
             background: #0f0f13; color: #e0e0e0; }
      .box { background: #1a1a24; border: 1px solid #333; border-radius: 10px;
             padding: 2rem 2.5rem; width: 320px; }
      h2 { margin: 0 0 1.5rem; font-size: 1.1rem; font-weight: 500; }
      input { width: 100%; box-sizing: border-box; padding: 0.6rem 0.75rem;
              background: #111; border: 1px solid #444; border-radius: 6px;
              color: #e0e0e0; font-size: 1rem; margin-bottom: 1rem; }
      button { width: 100%; padding: 0.65rem; background: #4a4aff;
               border: none; border-radius: 6px; color: #fff;
               font-size: 1rem; cursor: pointer; }
      button:hover { background: #3a3aee; }
      .err { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
    `;

    const box = document.createElement('div');
    box.className = 'box';
    box.innerHTML = `
      <h2>Admin access</h2>
      <input type="password" id="pw" placeholder="Password" autofocus />
      <button id="btn">Sign in</button>
      <div class="err" id="err"></div>
    `;

    document.head.innerHTML = '';
    document.head.appendChild(style);
    document.body.innerHTML = '';
    document.body.appendChild(box);
    document.documentElement.style.display = '';

    async function login() {
      const password = document.getElementById('pw').value;
      const r = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (r.ok) { location.reload(); }
      else { document.getElementById('err').textContent = 'Incorrect password'; }
    }

    document.getElementById('btn').addEventListener('click', login);
    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  })();
</script>
  <meta charset="UTF-8">
  <title>Session Transcripts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: white;
      border-right: 1px solid #ddd;
    }

    #sidebar header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #sidebar h1 { font-size: 15px; font-weight: 600; }

    #refresh-btn {
      font-size: 12px;
      padding: 4px 10px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }

    #refresh-btn:hover { background: #e0e0e0; }

    #session-list { flex: 1; overflow-y: auto; }

    .session-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }

    .session-item:hover { background: #f5f5f5; }
    .session-item.active { background: #e8f0fe; }

    .session-id {
      font-family: monospace;
      font-size: 12px;
      color: #333;
      margin-bottom: 3px;
    }

    .session-meta { font-size: 11px; color: #888; }

    /* ── Transcript panel ── */
    #transcript {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #transcript-header {
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
      color: #666;
      font-family: monospace;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 14px;
    }

    .msg-row { display: flex; flex-direction: column; }
    .msg-row.user { align-items: flex-end; }
    .msg-row.assistant { align-items: flex-start; }

    .bubble {
      max-width: 680px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: #007bff;
      color: white;
    }

    .msg-row.assistant .bubble {
      background: white;
      border: 1px solid #ddd;
      color: #111;
    }

    .msg-time {
      font-size: 10px;
      color: #aaa;
      margin-top: 4px;
      padding: 0 2px;
    }

    /* ── Tab content ── */
    #tab-content {
      flex: 1;
      overflow-y: auto;
    }

    #tab-content #messages {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Tabs ── */
    #tab-bar {
      display: flex;
      padding: 8px 20px 0;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #666;
      margin-right: 8px;
      margin-bottom: -1px;
    }

    .tab-btn.active {
      border-bottom-color: #2c2416;
      color: #2c2416;
      font-weight: 600;
    }

    /* ── Synthesis Notes ── */
    #synthesis-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .synth-empty {
      color: #999;
      font-style: italic;
      padding: 20px 0;
      font-size: 0.9rem;
    }

    .synth-section-header {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b7355;
      margin-top: 24px;
      margin-bottom: 8px;
      border-bottom: 1px solid #e8e0d0;
      padding-bottom: 4px;
    }

    .synth-field {
      margin-bottom: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .synth-label {
      font-weight: 600;
      color: #444;
      margin-right: 6px;
    }

    .synth-value { color: #222; }
  </style>
</head>
<body>

<div id="sidebar">
  <header>
    <h1>Sessions</h1>
    <button id="refresh-btn" onclick="loadSessions()">Refresh</button>
  </header>
  <div id="session-list"></div>
</div>

<div id="transcript">
  <div id="empty-state">Select a session to view its transcript</div>
</div>

<script>
  const BASE = window.location.origin;

  async function loadSessions() {
    const list = document.getElementById('session-list');
    list.innerHTML = '<div style="padding:16px;font-size:13px;color:#999">Loading...</div>';

    const res = await fetch(`${BASE}/admin/sessions`);
    const sessions = await res.json();

    list.innerHTML = '';

    if (!sessions.length) {
      list.innerHTML = '<div style="padding:16px;font-size:13px;color:#999">No sessions yet</div>';
      return;
    }

    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item';
      el.dataset.id = s.sessionId;
      const label = s.userIdentifier || `${s.sessionId.slice(0, 8)}&hellip;${s.sessionId.slice(-4)}`;
      el.innerHTML = `
        <div class="session-id">${label}</div>
        <div class="session-meta">${s.messageCount} messages &middot; ${s.lastActivity}</div>
      `;
      el.addEventListener('click', () => {
        document.querySelectorAll('.session-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        loadTranscript(s.sessionId, s.messageCount, s.userIdentifier);
      });
      list.appendChild(el);
    });
  }

  let activeTab = 'transcript';
  let currentData = null;
  let currentSessionId = null;
  let currentMessageCount = 0;
  let currentUserIdentifier = null;

  async function loadTranscript(sessionId, messageCount, userIdentifier) {
    const panel = document.getElementById('transcript');
    panel.innerHTML = '<div style="padding:20px;font-size:13px;color:#999">Loading...</div>';

    const res = await fetch(`${BASE}/admin/transcript/${sessionId}`);
    const data = await res.json();

    currentData = data;
    activeTab = 'transcript';
    renderPanel(sessionId, messageCount, userIdentifier || data.userIdentifier);
  }

  function renderPanel(sessionId, messageCount, userIdentifier) {
    currentSessionId = sessionId;
    currentMessageCount = messageCount;
    currentUserIdentifier = userIdentifier;

    const panel = document.getElementById('transcript');

    const headerLabel = userIdentifier
      ? `${escapeHtml(userIdentifier)} &nbsp;&middot;&nbsp; ${sessionId}`
      : sessionId;

    panel.innerHTML = `
      <div id="transcript-header">
        ${headerLabel} &nbsp;&middot;&nbsp; ${messageCount} messages
      </div>
      <div id="tab-bar">
        <button class="tab-btn ${activeTab === 'transcript' ? 'active' : ''}" data-tab="transcript">Transcript</button>
        <button class="tab-btn ${activeTab === 'synthesis' ? 'active' : ''}" data-tab="synthesis">Synthesis Notes</button>
      </div>
      <div id="tab-content"></div>
    `;

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        switchTab(btn.dataset.tab, currentSessionId, currentMessageCount, currentUserIdentifier);
      });
    });

    renderTabContent();
  }

  function switchTab(tab, sessionId, messageCount, userIdentifier) {
    activeTab = tab;
    renderPanel(sessionId, messageCount, userIdentifier);
  }

  function renderTabContent() {
    const container = document.getElementById('tab-content');
    if (!container) return;

    if (activeTab === 'transcript') {
      const messages = currentData.messages || currentData;
      const visible = messages.filter(m => m.content !== '__START__');
      container.innerHTML = `
        <div id="messages">
          ${visible.map(m => `
            <div class="msg-row ${m.role}">
              <div class="bubble">${escapeHtml(m.content)}</div>
              <div class="msg-time">
                ${m.timestamp_display ?? ''}${m.input_tokens != null ? ` &nbsp;&middot;&nbsp; ${m.input_tokens} in / ${m.output_tokens} out` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      container.querySelector('#messages').scrollTop = 0;
    } else {
      console.log('[SYNTH] activeTab:', activeTab);
      console.log('[SYNTH] currentData.extractionJson:', currentData.extractionJson ? 'present' : 'null');
      container.innerHTML = `<div id="synthesis-panel">${renderSynthesisNotes(currentData.extractionJson)}</div>`;
    }
  }

  function val(v) {
    if (v == null || v === '') return '--';
    if (Array.isArray(v)) return v.length ? v : null;
    return v;
  }

  function field(label, value, format) {
    const raw = val(value);
    let display;
    if (raw === '--') {
      display = '--';
    } else if (format === 'comma' && Array.isArray(raw)) {
      display = raw.join(', ') || '--';
    } else if (format === 'lines' && Array.isArray(raw)) {
      display = raw.join('<br>') || '--';
    } else {
      display = escapeHtml(String(raw));
    }
    return `<div class="synth-field"><span class="synth-label">${label}:</span><span class="synth-value">${display}</span></div>`;
  }

  function renderSynthesisNotes(ex) {
    console.log('[SYNTH] renderSynthesisNotes called with:', ex ? 'data present' : 'null');
    if (!ex) return '<p class="synth-empty">Synthesis notes not available for this session.</p>';

    const id = ex.identity_signals || {};
    const cr = ex.current_reality || {};
    const hp = ex.history_and_pattern || {};
    const et = ex.emotional_texture || {};
    const sp = ex.signal_phrases || [];

    return `
      <div class="synth-section-header">About This Person</div>
      ${field('Self-descriptions', id.self_descriptions, 'comma')}
      ${field('Roles', id.roles_mentioned, 'comma')}
      ${field('Beliefs about self', id.implied_beliefs_about_self, 'lines')}

      <div class="synth-section-header">Their Situation</div>
      ${field('Life situation', cr.life_situation)}
      ${field('What feels stuck', cr.what_feels_stuck)}
      ${field('Significant asides', cr.significant_asides, 'lines')}

      <div class="synth-section-header">History &amp; Pattern</div>
      ${field('Previous attempts', hp.previous_attempts, 'lines')}
      ${field('Recurring pattern', hp.recurring_pattern)}

      <div class="synth-section-header">Emotional Texture</div>
      ${field('Dominant tone', et.dominant_tone)}
      ${field('Energy rises around', et.energy_rises_around, 'comma')}
      ${field('Energy drops around', et.energy_drops_around, 'comma')}
      ${field('Carrying', et.what_they_seem_to_be_carrying)}

      <div class="synth-section-header">Signal Phrases</div>
      ${sp.length ? sp.map(p => `<div class="synth-field synth-value">"${escapeHtml(String(p))}"</div>`).join('') : '<div class="synth-field synth-value">--</div>'}

      <div class="synth-section-header">Goals</div>
      ${field('Surface goal', ex.surface_goal)}
      ${field('Real goal', ex.real_goal)}
      ${field('Central tension', ex.central_tension)}
    `;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  loadSessions();
</script>
</body>
</html>
